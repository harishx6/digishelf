{% load static %}
<!doctype html>
<html lang="en" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}DigiShelf Pro | Authentication{% endblock %}</title>
    
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Custom Premium Styles -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    
    {% block extra_head %}{% endblock %}
</head>
<body class="d-flex flex-column min-vh-100 p-0 m-0">

    <!-- Main Content Area -->
    <main class="flex-grow-1 animate-slide-up d-flex flex-column">
        {% block content %}{% endblock %}
    </main>

    <!-- Bootstrap & Custom JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // DARK MODE LOGIC (Standardized)
        const currentTheme = localStorage.getItem('theme') || 'light';
        document.documentElement.setAttribute('data-bs-theme', currentTheme);
        
        // Show alerts dynamically if any
        {% if messages %}
            {% for message in messages %}
                Swal.fire({
                    icon: '{{ message.tags|default:"info" }}' === 'error' ? 'error' : '{{ message.tags|default:"success" }}',
                    title: '{{ message }}',
                    showConfirmButton: false,
                    timer: 3000,
                    toast: true,
                    position: 'top-end'
                });
            {% endfor %}
        {% endif %}
    </script>
    {% block extra_js %}{% endblock %}
</body>
</html>
