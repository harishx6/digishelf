<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
    /* ============================
       PREMIUM ADMIN DASHBOARD STYLES
    ============================ */
    @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

    :root {
        --stats-bg: #ffffff;
        --stats-border: rgba(0,0,0,0.05);
        --stats-text-main: #2d3436;
        --stats-text-muted: #636e72;
        --stats-shadow: rgba(0,0,0,0.05);
        --stats-dropdown-bg: #f8f9fa;
        --stats-dropdown-border: #dfe6e9;
    }
    
    [data-theme="dark"] {
        --stats-bg: #1e1e24;
        --stats-border: rgba(255,255,255,0.08);
        --stats-text-main: #e2e8f0;
        --stats-text-muted: #94a3b8;
        --stats-shadow: rgba(0,0,0,0.3);
        --stats-dropdown-bg: #2d3748;
        --stats-dropdown-border: #4a5568;
    }

    @media (prefers-color-scheme: dark) {
        :root:not([data-theme="light"]) {
            --stats-bg: #1e1e24;
            --stats-border: rgba(255,255,255,0.08);
            --stats-text-main: #e2e8f0;
            --stats-text-muted: #94a3b8;
            --stats-shadow: rgba(0,0,0,0.3);
            --stats-dropdown-bg: #2d3748;
            --stats-dropdown-border: #4a5568;
        }
    }

    .dashboard-metrics { 
        display: flex; gap: 20px; margin-bottom: 30px; flex-wrap: wrap; 
        font-family: 'Poppins', sans-serif;
    }

    .metric-card, .chart-container {
        background: var(--stats-bg);
        border: 1px solid var(--stats-border);
        border-radius: 16px;
        box-shadow: 0 10px 30px var(--stats-shadow);
        transition: transform 0.3s, box-shadow 0.3s, background-color 0.3s;
        font-family: 'Poppins', sans-serif;
    }

    .metric-card {
        flex: 1; min-width: 200px; padding: 25px 20px;
        position: relative; overflow: hidden;
    }
    
    .metric-card::before {
        content: ""; position: absolute; top: 0; left: 0; width: 6px; height: 100%;
    }
    .metric-card:nth-child(1)::before { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); }
    .metric-card:nth-child(2)::before { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    .metric-card:nth-child(3)::before { background: linear-gradient(135deg, #f6d365 0%, #fda085 100%); }
    .metric-card:nth-child(4)::before { background: linear-gradient(135deg, #f5576c 0%, #f093fb 100%); }

    .metric-card:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.1); }

    .metric-card h2, .chart-title { margin: 0; color: var(--stats-text-main); font-weight: 700; transition: color 0.3s; }
    .metric-card h2 { font-size: 2.5rem; line-height: 1; margin-bottom: 5px; }
    
    .metric-card p { 
        margin: 0; color: var(--stats-text-muted); font-size: 0.85rem; text-transform: uppercase; 
        letter-spacing: 1px; font-weight: 600; transition: color 0.3s;
    }
    
    .chart-container { padding: 30px; margin-bottom: 30px; height: 400px; position: relative; }
    .chart-title { font-size: 1.4rem; display: flex; align-items: center; gap: 10px; }

    .chart-dropdown {
        background-color: var(--stats-dropdown-bg);
        color: var(--stats-text-main);
        border: 1px solid var(--stats-dropdown-border);
        padding: 8px 16px; border-radius: 8px; font-weight: 600; cursor: pointer; outline: none;
        font-family: 'Poppins', sans-serif; transition: 0.2s;
    }
    .chart-dropdown:focus, .chart-dropdown:hover { border-color: #667eea; background: #ffffff; box-shadow: 0 0 10px rgba(102, 126, 234, 0.1); }
</style>

<div class="dashboard-metrics">
    <div class="metric-card">
        <h2>{{ total_books }}</h2><p>Total Books</p>
    </div>
    <div class="metric-card">
        <h2>{{ total_members }}</h2><p>Active Members</p>
    </div>
    <div class="metric-card">
        <h2>{{ issued_count }}</h2><p>Books Issued</p>
    </div>
    <div class="metric-card">
        <h2>{{ returned_count }}</h2><p>Books Returned</p>
    </div>
</div>

<div class="chart-container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px;">
        <h2 class="chart-title" id="dynamicChartTitle">📊 <span style="font-weight: 600;">Last 7 Days Activity</span></h2>
        <select id="timeFilter" class="chart-dropdown" onchange="updateChart()">
            <option value="1">Today</option>
            <option value="7" selected>Last 7 Days</option>
            <option value="30">Last 30 Days</option>
            <option value="90">Last 90 Days</option>
        </select>
    </div>
    <div style="height: 300px; position: relative;">
        <canvas id="adminChart"></canvas>
    </div>
</div>

<script>
    const allLabels = {{ graph_labels|safe }};
    const allDataIssued = {{ graph_data_issued|safe }};
    const allDataReturned = {{ graph_data_returned|safe }};
    
    let adminChart;
    
    let isDark = (document.documentElement.getAttribute('data-theme') === 'dark' || 
                 (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches && document.documentElement.getAttribute('data-theme') !== 'light'));
    
    Chart.defaults.font.family = "'Poppins', sans-serif";
    Chart.defaults.color = isDark ? '#94a3b8' : '#636e72'; 
    Chart.defaults.borderColor = isDark ? 'rgba(255, 255, 255, 0.1)' : 'rgba(223, 230, 233, 0.5)';

    function initChart() {
        const ctx = document.getElementById('adminChart').getContext('2d');
        
        const labels = allLabels.slice(-7);
        const dataIssued = allDataIssued.slice(-7);
        const dataReturned = allDataReturned.slice(-7);

        adminChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: labels,
                datasets: [
                    {
                        label: 'Books Issued',
                        data: dataIssued,
                        backgroundColor: 'rgba(102, 126, 234, 0.85)',
                        borderColor: 'rgba(102, 126, 234, 1)',
                        borderWidth: 2,
                        borderRadius: 6,
                        maxBarThickness: 45
                    },
                    {
                        label: 'Books Returned',
                        data: dataReturned,
                        backgroundColor: 'rgba(245, 87, 108, 0.85)',
                        borderColor: 'rgba(245, 87, 108, 1)',
                        borderWidth: 2,
                        borderRadius: 6,
                        maxBarThickness: 45
                    }
                ]
            },
            options: {
                responsive: true,
                maintainAspectRatio: false,
                plugins: { 
                    legend: { 
                        display: true, 
                        position: 'top',
                        labels: { usePointStyle: true, boxWidth: 10, padding: 20, font: { weight: '600' } }
                    },
                    tooltip: {
                        backgroundColor: 'rgba(45, 52, 54, 0.9)',
                        titleFont: { size: 14, family: "'Poppins', sans-serif", weight: 'bold' },
                        bodyFont: { size: 13, family: "'Poppins', sans-serif" },
                        padding: 12,
                        cornerRadius: 8,
                        displayColors: true
                    }
                }, 
                scales: {
                    x: { grid: { display: false } },
                    y: { beginAtZero: true, ticks: { stepSize: 1, padding: 10 }, border: { dash: [5, 5] } }
                }
            }
        });
    }

    function updateChart() {
        const selectBox = document.getElementById('timeFilter');
        const days = parseInt(selectBox.value);
        const selectedText = selectBox.options[selectBox.selectedIndex].text;
        
        document.getElementById('dynamicChartTitle').innerHTML = `📊 <span style="font-weight: 600;">${selectedText} Activity</span>`;

        adminChart.data.labels = allLabels.slice(-days);
        adminChart.data.datasets[0].data = allDataIssued.slice(-days);
        adminChart.data.datasets[1].data = allDataReturned.slice(-days);
        
        const thickness = days > 30 ? 15 : 45;
        adminChart.data.datasets[0].maxBarThickness = thickness;
        adminChart.data.datasets[1].maxBarThickness = thickness;

        adminChart.update();
    }

    initChart();
</script>
