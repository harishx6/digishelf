{% extends 'base_auth.html' %}
{% load static %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-glass-card">
        <h2 class="fw-bold mb-2">Verify OTP</h2>
        <p class="small opacity-75 mb-4">Enter the 6-digit code sent to your email</p>

        {% if messages %}
            {% for message in messages %}
                <div class="p-2 mb-3 rounded-3 small text-center" style="background: rgba(255, 71, 87, 0.2); border: 1px solid rgba(255, 71, 87, 0.4);">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="POST" id="otpForm">
            {% csrf_token %}

            <div class="d-flex justify-content-between mb-4">
                <input type="text" maxlength="1" class="otp otp-input text-center fw-bold fs-4">
                <input type="text" maxlength="1" class="otp otp-input text-center fw-bold fs-4">
                <input type="text" maxlength="1" class="otp otp-input text-center fw-bold fs-4">
                <input type="text" maxlength="1" class="otp otp-input text-center fw-bold fs-4">
                <input type="text" maxlength="1" class="otp otp-input text-center fw-bold fs-4">
                <input type="text" maxlength="1" class="otp otp-input text-center fw-bold fs-4">
            </div>

            <input type="hidden" name="otp" id="finalOtp">

            <button type="submit" class="btn btn-aesthetic w-100">Verify & Continue</button>
        </form>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<style>
.otp-input {
    width: 45px;
    height: 55px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.4);
    background: rgba(255,255,255,0.1);
    color: white;
    transition: 0.2s;
}
.otp-input:focus {
    outline: none;
    border: 1px solid #fff;
    box-shadow: 0 0 10px rgba(255,255,255,0.6);
    transform: scale(1.05);
}
</style>

<script>
const inputs = document.querySelectorAll(".otp");

inputs.forEach((input, index) => {
    input.addEventListener("input", () => {
        if (input.value.length === 1 && index < inputs.length - 1) {
            inputs[index + 1].focus();
        }
    });

    input.addEventListener("keydown", (e) => {
        if (e.key === "Backspace" && !input.value && index > 0) {
            inputs[index - 1].focus();
        }
    });
});

document.getElementById("otpForm").addEventListener("submit", function () {
    let otp = "";
    inputs.forEach(input => otp += input.value);
    document.getElementById("finalOtp").value = otp;
});

// Use standard UI alerts via Jinja
{% if status == 'success' %}
Swal.fire({
    title: 'Success!',
    text: 'Your account has been verified! Welcome to DigiShelf.',
    icon: 'success',
    confirmButtonText: 'Go to Login',
}).then(() => {
    window.location.href = "{% url 'login' %}";
});

{% elif status == 'error' %}
Swal.fire({
    title: 'Wrong OTP',
    text: 'Invalid code. Please try again.',
    icon: 'error',
    confirmButtonText: 'Retry',
});
{% endif %}
</script>
{% endblock %}
