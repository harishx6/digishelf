{% extends 'base_auth.html' %}
{% load static %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-glass-card">
        
        <div class="auth-brand-icon">
            <img src="{% static 'images/TN Logo.png' %}" alt="TN Logo" width="55">
        </div>
        
        <h2 class="fw-bold mb-1">DigiShelf</h2>
        <p class="mb-4 small opacity-75">Welcome back! Please login to your account.</p>

        {% if form.errors %}
            <div class="p-2 mb-4 rounded-3 small" style="background: rgba(255, 71, 87, 0.2); border: 1px solid rgba(255, 71, 87, 0.4);">
                <i class="fas fa-info-circle me-2"></i> Invalid credentials.
            </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            
            <label class="auth-label">USERNAME</label>
            <div class="custom-input-group">
              <input type="text" name="username" placeholder="Type your username..." required>
            </div>

            <label class="auth-label">PASSWORD</label>
            <div class="custom-input-group">
              <input type="password" name="password" id="passInput" placeholder="Enter password..." required>
              <span class="eye-btn" onclick="toggleVisibility()">
                <i class="fas fa-eye" id="eyeIcon"></i>
              </span>
            </div>

            <button type="submit" class="btn btn-aesthetic w-100 mt-2">
              Sign In
            </button>
        </form>

        <div class="mt-4">
            <p class="mb-1">
                <a href="{% url 'forgot_password' %}" class="text-white text-decoration-none" style="opacity: 0.85;">Forgot Password?</a>
            </p>
            <p class="mb-0 small">
                New here? <a href="{% url 'signup' %}" class="fw-bold text-white">Join the Library</a>
            </p>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    function toggleVisibility() {
        const input = document.getElementById('passInput');
        const icon = document.getElementById('eyeIcon');
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }
</script>
{% endblock %}
