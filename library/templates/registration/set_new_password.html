{% extends 'base_auth.html' %}
{% load static %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-glass-card">
        <h3 class="fw-bold mb-2">New Password</h3>
        <p class="small opacity-75 mb-4">Create a strong password to secure your account</p>

        {% if messages %}
            {% for message in messages %}
                <div class="p-2 mb-3 rounded-3 small text-center" style="background: rgba(255, 71, 87, 0.2); border: 1px solid rgba(255, 71, 87, 0.4);">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="text-start mb-3">
                <label class="auth-label">NEW PASSWORD</label>
                <div class="custom-input-group mb-0">
                    <input type="password" name="pass1" placeholder="Min. 8 characters" required>
                </div>
            </div>

            <div class="text-start mb-4">
                <label class="auth-label">CONFIRM PASSWORD</label>
                <div class="custom-input-group mb-0">
                    <input type="password" name="pass2" placeholder="Repeat password" required>
                </div>
            </div>

            <button type="submit" class="btn btn-aesthetic w-100">Update Password</button>
        </form>
    </div>
</div>
{% endblock %}
