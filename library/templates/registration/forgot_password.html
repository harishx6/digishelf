{% extends 'base_auth.html' %}
{% load static %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-glass-card">
        <h3 class="fw-bold mb-3">Recover Account</h3>
        <p class="mb-4 small opacity-75">Enter your email and we'll send you an OTP to reset your password.</p>

        {% if messages %}
            {% for message in messages %}
                <div class="p-2 mb-3 rounded-3 small text-center" style="background: rgba(255, 71, 87, 0.2); border: 1px solid rgba(255, 71, 87, 0.4);">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="custom-input-group mb-4">
                <input type="email" name="email" placeholder="Registered Email ID" required>
            </div>
            
            <button type="submit" class="btn btn-aesthetic w-100">Send Reset OTP</button>
        </form>

        <div class="mt-4">
            <a href="{% url 'login' %}" class="small text-white text-decoration-none opacity-75">← Back to Login</a>
        </div>
    </div>
</div>
{% endblock %}
